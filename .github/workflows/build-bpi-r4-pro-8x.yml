# Build base (default when no commit inputs given) — keep in sync with the builder scripts:
#   OPENWRT_COMMIT: 6dead2869209f4ff9825f3169c129c5ef04f6273  (openwrt-25.12 HEAD, 2026-06-28)
#   MTK_COMMIT:     13f39a7448764466f0ab5eb290fdefd9a9d2335b  (github git01 HEAD, 2026-06-28)
# Bumped 2026-06-28, HW verified on both routers (prev base 949487e0 / 42c9ff = 6.12.92).
#
# Previous bases:
#   2026-06-16: 949487e0... / 3f8797ce... (6.12.92)
#   ~2026-05:   13ff2256... / dceb45f8...

name: Build BPI-R4 Pro 8X

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        default: 'Pro-8X-wifi'
        type: choice
        options:
          - Pro-8X-wifi
          - Pro-8X-wired
      repo_commit:
        description: 'Commit hash of this repository (leave empty for latest)'
        required: false
        default: ''
      openwrt_commit:
        description: 'OpenWrt commit hash (leave empty to use build-versions.env)'
        required: false
        default: ''
      mtk_commit:
        description: 'MTK SDK commit hash (leave empty to use build-versions.env)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.repo_commit || github.sha }}

      - name: Load build versions
        run: |
          grep -v '^\s*#' build-versions.env | grep -v '^\s*$' >> $GITHUB_ENV
          [ -n "${{ github.event.inputs.openwrt_commit }}" ] && echo "OPENWRT_COMMIT=${{ github.event.inputs.openwrt_commit }}" >> $GITHUB_ENV || true
          [ -n "${{ github.event.inputs.mtk_commit }}" ] && echo "MTK_COMMIT=${{ github.event.inputs.mtk_commit }}" >> $GITHUB_ENV || true

      - name: Set build variables
        run: |
          VARIANT="${{ github.event.inputs.variant }}"

          if [ "$VARIANT" = "Pro-8X-wifi" ]; then
            echo "BUILDER=./builder-pro-8x.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-pro-8x-standard" >> $GITHUB_ENV
          else
            echo "BUILDER=./builder-pro-8x-wired.sh" >> $GITHUB_ENV
            echo "RELEASE_TAGS=release-pro-8x-wired" >> $GITHUB_ENV
          fi

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync swig unzip zlib1g-dev file wget libelf-dev ccache git

      - name: Run builder script
        run: |
          chmod +x ${{ env.BUILDER }}
          ${{ env.BUILDER }}
        env:
          OPENWRT_COMMIT: ${{ env.OPENWRT_COMMIT }}
          MTK_COMMIT: ${{ env.MTK_COMMIT }}

      - name: Prepare release artifacts
        run: |
          VARIANT="${{ github.event.inputs.variant }}"
          FILOGIC="openwrt/bin/targets/mediatek/filogic"

          mkdir -p rel-pro
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-squashfs-sysupgrade.itb" rel-pro/bpi-r4-pro-8x.itb
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-nvme-img.bin"            rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-sdcard.img.gz"           rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-emmc-img.bin"            rel-pro/
          cp "${FILOGIC}/openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-snand-img.bin"           rel-pro/
          cp "${FILOGIC}/config.buildinfo"                                                          rel-pro/
          cp unifi/unifi-setup.sh                                                                  rel-pro/
          cp unifi/rc.local                                                                        rel-pro/
          cp unifi/rc-network.sh                                                                   rel-pro/
          cp unifi/unifi-network-setup-8gb.sh                                                      rel-pro/unifi-network-setup.sh
          cd rel-pro
          sha256sum bpi-r4-pro-8x.itb \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-nvme-img.bin \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-sdcard.img.gz \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-emmc-img.bin \
            openwrt-mediatek-filogic-bananapi_bpi-r4-pro-8x-snand-img.bin > sha256sums
          cd ..

      - name: Publish release-pro-8x-standard
        if: github.event.inputs.variant == 'Pro-8X-wifi'
        run: |
          gh release delete release-pro-8x-standard --yes --cleanup-tag 2>/dev/null || true
          gh release create release-pro-8x-standard rel-pro/* \
            --title "BPI-R4 Pro 8X standard WiFi (latest)" \
            --notes "Variant: standard (WiFi + wifimgr) | RAM: 8GB | BPI-R4 Pro 8X | Commit: ${{ github.event.inputs.repo_commit || github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release-pro-8x-wired
        if: github.event.inputs.variant == 'Pro-8X-wired'
        run: |
          gh release delete release-pro-8x-wired --yes --cleanup-tag 2>/dev/null || true
          gh release create release-pro-8x-wired rel-pro/* \
            --title "BPI-R4 Pro 8X wired (latest)" \
            --notes "Variant: wired (no wifimgr) | RAM: 8GB | BPI-R4 Pro 8X | Commit: ${{ github.event.inputs.repo_commit || github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
